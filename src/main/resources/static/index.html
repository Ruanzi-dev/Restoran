<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restoran rõõmus</title>

</head>
<body>
<h1>Restoran Rõõmus</h1>
<h2>Filteeri enda soovi järgi lauad</h2>
<link rel="stylesheet" href="style.css"> <!-- css faili kasutamine, kus kujunde värve saab muuta -->

<div id="Filter" style="margin-bottom: 30px;"> <!--filtrite koht, kus saab filtreerida kohti-->
    <label>Inimesed:
        <input type="number" id="inimesed" value="1" min="1">
    </label>
    <label>Tsoon: <!-- tsooni jaoks -->
        <select id="tsoon">
            <option value="">Kõik sobivad</option>
            <option value="akna all">Akna all</option>
            <option value="siseruum">Siseruum</option>  <!-- tsooni valikud -->
            <option value="terrass">Terass</option>
            <option value="privaatruum">Privaatruum</option>
            <option value="lastenurga lähedal">Lastenurga lähedal</option>
        </select>
    </label>
    <label>Kuupäev
    <input type="date" id="kuupaev">
    </label>
    <label>Kellaaeg:
    <input type="time" id="kellaaeg"></label>
    <button id="otsi">Leia laud</button>
</div>


<div id="restoran" style="position: relative; display: inline-block">
    <img src="restoran.png" alt="restorani plaan" style="display:block;"> <!--restorani plaani pilt-->

</div>

</body>
</html>

<script src="script.js"></script>
